<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የካርታ ጨዋታ ጠረጴዛ</title>
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* የካርታ ጠረጴዛው */
        .game-table {
            width: 90%;
            max-width: 600px;
            height: 400px;
            background-color: #27ae60; /* አረንጓዴ ቀለም */
            border: 10px solid #7f8c8d;
            border-radius: 150px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* የካርታዎች መያዣ */
        .card-area {
            display: flex;
            gap: 10px;
        }

        /* የአንድ ካርታ ዲዛይን */
        .card {
            width: 60px;
            height: 90px;
            background-color: white;
            border-radius: 5px;
            border: 2px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .red { color: red; }
        .black { color: black; }

        .status-text {
            color: white;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div class="game-table">
        <div class="status-text">የኮምፒውተሩ ካርታዎች</div>
        
        <div class="card-area">
            <div class="card" style="background-color: #34495e;"></div>
            <div class="card" style="background-color: #34495e;"></div>
        </div>

        <div class="status-text">የእርስዎ ካርታዎች</div>

        <div class="card-area">
            <div class="card red">A ♥</div>
            <div class="card black">K ♠</div>
        </div>
    </div>

</body>
</html>
